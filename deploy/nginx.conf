# Social media bot detection
map $http_user_agent $is_social_bot {
    default                     0;
    ~*facebookexternalhit       1;
    ~*Facebot                   1;
    ~*Twitterbot                1;
    ~*LinkedInBot               1;
    ~*Discordbot                1;
    ~*Slackbot                  1;
    ~*TelegramBot               1;
    ~*WhatsApp                  1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # API requests → backend (FastAPI on port 8000)
    location ~ ^/api(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → frontend (nginx serving static files on port 80)
    location / {
        # Serve OG meta tags to social media bots
        if ($is_social_bot) {
            rewrite ^(.*)$ /api/og?path=$1 last;
        }

        proxy_pass http://frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
    }
}
