# VEAF Website — Production Docker Compose
#
# Deploy from pre-built images. Requires:
#   - An external PostgreSQL database (accessible via the "postgres" network)
#   - An external reverse proxy (e.g. nginx-proxy) on the "webproxy" network
#
# Quick start:
#   cp .env.dist .env                 # edit with your values
#   cp backend.env.dist backend.env   # edit with real values
#   docker compose up -d
#
# Staging (with MailDev to catch outgoing emails):
#   Set COMPOSE_PROFILES=staging in .env
#   Set MAIL_SERVER=maildev, MAIL_PORT=1025, MAIL_TLS=false in backend.env
#   MailDev UI: http://maildev.<VIRTUAL_HOST> (login/pass from .env)

services:
  backend:
    image: ghcr.io/veaf/website-2026-backend:${TAG:-latest}
    restart: unless-stopped
    env_file: ./backend.env
    volumes:
      - uploads:/app/uploads
    networks:
      - default
      - postgres
    # Healthcheck is built into the image (GET /api/health)

  frontend:
    image: ghcr.io/veaf/website-2026-frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
    # Healthcheck is built into the image

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST:-veaf.org}
      LETSENCRYPT_HOST: ${VIRTUAL_HOST:-veaf.org}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    depends_on:
      - backend
      - frontend
    networks:
      - default
      - webproxy

  # MailDev — SMTP catch-all for staging environments
  # Activated via COMPOSE_PROFILES=staging in .env
  # In backend.env, set: MAIL_SERVER=maildev  MAIL_PORT=1025  MAIL_TLS=false
  maildev:
    image: maildev/maildev:2.1.0
    restart: unless-stopped
    profiles:
      - staging
    environment:
      VIRTUAL_HOST: maildev.${VIRTUAL_HOST:-veaf.org}
      LETSENCRYPT_HOST: maildev.${VIRTUAL_HOST:-veaf.org}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      MAILDEV_WEB_USER: ${MAILDEV_WEB_USER:-veaf}
      MAILDEV_WEB_PASS: ${MAILDEV_WEB_PASS:-changeme}
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    networks:
      - default
      - webproxy

volumes:
  uploads:

networks:
  webproxy:
    name: ${WEBPROXY_NETWORK:-webproxy}
    external: true
  postgres:
    name: ${POSTGRES_NETWORK:-postgres}
    external: true
