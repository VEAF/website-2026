services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST:-veaf.localhost}
    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:alpine
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST:-veaf.localhost}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - default
      - webproxy
    depends_on:
      - backend
      - frontend

  maildev:
    image: maildev/maildev:2.1.0
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
      VIRTUAL_HOST: maildev.${VIRTUAL_HOST:-veaf.localhost}
      VIRTUAL_PORT: 1080
    networks:
      - default
      - webproxy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veaf
      POSTGRES_USER: veaf
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veaf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads:

networks:
  webproxy:
    external: true
